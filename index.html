<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MetVlc · Rayos e incendios</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css?v=20260701-1" />
</head>

<body>
  <div class="page">

    <header class="header">
      <div class="title">MetVlc · Visor de rayos e incendios</div>
      <div class="subtitle">
        Rayos SIGIF/GVA · Modelo de combustible · Pendiente · NDMI
      </div>
    </header>

    <section class="toolbar">
      <div class="toolbar-title">Periodo de rayos</div>

      <div class="buttons">
        <button class="time-btn active" data-hours="24">Últimas 24 h</button>
        <button class="time-btn" data-hours="48">Últimas 48 h</button>
        <button class="time-btn" data-hours="72">Últimas 72 h</button>
      </div>

      <div id="infoRayos" class="info-rayos">
        Cargando rayos...
      </div>
    </section>

    <div id="map"></div>

    <section class="footer">
      <strong>Fuente rayos:</strong> SIGIF/GVA ·
      <strong>Visualización:</strong> MetVlc ·
      Datos orientativos para seguimiento meteorológico, rayos latentes y análisis territorial.
    </section>

  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin="">
  </script>

  <!-- Visor propio -->
  <script src="js/visor.js?v=20260701-1"></script>
</body>
</html>
