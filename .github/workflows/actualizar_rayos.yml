name: Actualizar rayos SIGIF GVA

on:
 
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-rayos-sigif
  cancel-in-progress: true

env:
  SIGIF_KML_URL: "https://prevencionincendiosgva.es/Meteorologia/GetRayos24hKML"
  VALENCIA_BBOX: "-1.70,38.60,0.05,40.25"

jobs:
  actualizar-rayos:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Descargar KML SIGIF y generar GeoJSON
        run: python scripts/actualizar_rayos_sigif.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add datos/rayos
          git commit -m "Actualizar rayos SIGIF GVA 24-48-72h" || echo "Sin cambios"
          git push
